---
name: Actionlint
permissions:
  contents: read
on:
  pull_request:
  merge_group:
  workflow_dispatch:
jobs:
  actionlint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d  # v1.72.0
        with:
          fail_level: any
          filter_mode: nofilter
