---
name: Actionlint
permissions:
  contents: read
on:
  pull_request:
  merge_group:
  workflow_dispatch:
jobs:
  actionlint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: reviewdog/action-actionlint@50b75b9513baa71e6a1899a1ebaa9ac9851cf16c  # v1.66.0
        with:
          fail_level: any
          filter_mode: nofilter
